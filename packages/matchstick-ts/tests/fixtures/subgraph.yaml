specVersion: 1.0.0
schema:
  file: ./minimal-schema.graphql
dataSources:
  - kind: ethereum
    name: Counter
    network: mainnet
    source:
      address: "0x0000000000000000000000000000000000000001"
      abi: Counter
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Counter
      abis:
        - name: Counter
          file: ./Counter.json
      eventHandlers:
        - event: ValueSet(uint256)
          handler: handleValueSet
      file: ./mapping-stub.ts
